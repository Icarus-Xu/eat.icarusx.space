<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#FBF5EC">
    <title>Offline | What to Eat</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fbf5ec;
        --fg: #211a15;
        --muted: #76695e;
        --accent: #e4572e;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #211a15;
          --fg: #f8efe3;
          --muted: #c8bdae;
          --accent: #ff875f;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 420px);
      }

      img {
        width: 64px;
        height: 64px;
        border-radius: 14px;
      }

      h1 {
        margin: 24px 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 12px;
        background: var(--accent);
        color: white;
        padding: 0 18px;
        font: inherit;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon.svg" alt="">
      <h1>You are offline</h1>
      <p>Reconnect to load What to Eat and continue using your saved restaurants.</p>
      <button type="button" onclick="location.reload()">Retry</button>
    </main>
  </body>
</html>
